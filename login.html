<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUEST - Login</title>
<link rel="stylesheet" href="style.css">
</head><body><div class="auth-page page"><div class="hero-logo">Q</div>
<h1 class="hero-title">QUEST</h1>
<p class="hero-tagline">Welcome Back • Continue Your Journey</p>

<div class="auth-card">

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button class="primary-btn" onclick="login()">
        Login
    </button>

    <button class="secondary-btn" onclick="goSignup()">
        Create Account
    </button>

</div>

</div><script type="module">

import { auth } from "./firebase-config.js";

import {
    signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

window.login = async function() {

    const email =
        document.getElementById("email").value;

    const password =
        document.getElementById("password").value;

    if (!email || !password) {
        alert("Please fill all fields");
        return;
    }

    try {

        await signInWithEmailAndPassword(
            auth,
            email,
            password
        );

        alert("Login successful");

        window.location.href =
            "dashboard.html";

    } catch (error) {

        alert(error.message);

    }

};

window.goSignup = function() {

    window.location.href =
        "signup.html";

};

</script></body>
</html>
