<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="auth-page">

    <div class="hero-logo">Q</div>
    <h1 class="hero-title">QUEST</h1>
    <p class="hero-tagline">Level Up Your Life</p>

    <div class="auth-card">

        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">

        <button class="primary-btn" onclick="login()">Login</button>
        <button class="secondary-btn" onclick="goSignup()">Create Account</button>

    </div>

</div>

<script>
function login(){
    localStorage.setItem("loggedIn","true");
    window.location.href="dashboard.html";
}

function goSignup(){
    window.location.href="signup.html";
}
</script>

</body>
</html>
