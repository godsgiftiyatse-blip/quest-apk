<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUEST - Sign Up</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- AUTH PAGE -->
<div class="auth-page page">

    <!-- HERO BRAND -->
    <div class="hero-logo">Q</div>
    <h1 class="hero-title">QUEST</h1>
    <p class="hero-tagline">Start Your Journey • Level Up Your Life</p>

    <!-- SIGNUP CARD -->
    <div class="auth-card">

        <input type="text" id="name" placeholder="Full Name">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">

        <button class="primary-btn" onclick="signup()">Create Account</button>

        <button class="secondary-btn" onclick="goLogin()">Back to Login</button>

    </div>

</div>

<script>
/* =========================
   SIGNUP SYSTEM (V3)
========================= */

function signup(){

    let name = document.getElementById("name").value;

    if(name.trim() === ""){
        alert("Please enter your name");
        return;
    }

    // save user session
    localStorage.setItem("loggedIn", "true");
    localStorage.setItem("username", name);
    localStorage.setItem("xp", "0");
    localStorage.setItem("level", "1");

    // redirect to app
    window.location.href = "dashboard.html";
}

/* =========================
   NAVIGATION
========================= */

function goLogin(){
    window.location.href = "login.html";
}
</script>

</body>
</html>
