<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quest RPG | Sign Up</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #1b1f3a, #0a0d1a);
    font-family: Arial;
    color: white;
}

.card {
    width: 320px;
    padding: 25px;
    border-radius: 15px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: none;
    border-radius: 8px;
    outline: none;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #4f7cff;
    color: white;
}

button:hover {
    background: #365edb;
}

.small {
    font-size: 12px;
    color: #aaa;
    margin-top: 10px;
}

.error {
    color: #ff5c5c;
    font-size: 13px;
    margin-top: 8px;
}
</style>
</head>

<body>

<div class="card">

    <h2>🧾 Create Hero</h2>

    <form id="signupForm">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">

        <button id="signupBtn" type="submit">Start Adventure</button>

        <div class="error" id="error"></div>
    </form>

    <button onclick="googleSignup()">🔵 Google Signup</button>

    <div class="small">
        Already have account? <a href="login.html" style="color:#4f7cff">Login</a>
    </div>

</div>

<script type="module" src="signup.js"></script>

</body>
</html>
