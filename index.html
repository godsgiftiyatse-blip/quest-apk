<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUEST Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

    <div class="user-info">
        <h3>Good Morning 👋</h3>
        <p>Ambitious Explorer</p>
    </div>

    <div class="avatar">K</div>

</div>

<!-- MAIN DASHBOARD -->
<div class="dashboard">

    <!-- XP CARD -->
    <div class="card xp-card">

        <div class="level-row">
            <h2>Level 7</h2>
            <span>620 / 1000 XP</span>
        </div>

        <div class="progress-bar">
            <div class="progress"></div>
        </div>

    </div>

    <!-- CURRENT QUEST -->
    <div class="card">

        <h3>Current Quest</h3>
        <p class="quest-title">WAEC Excellence</p>

        <div class="progress-text">60% Complete</div>

    </div>

    <!-- TODAY TASKS -->
    <div class="card">

        <h3>Today's Tasks</h3>

        <div class="task done">✔ <span>Study Mathematics</span></div>
        <div class="task pending">○ <span>Solve Past Questions</span></div>
        <div class="task pending">○ <span>Review Notes</span></div>

    </div>

    <!-- QUICK ACTIONS -->
    <div class="actions">

        <button class="action-btn">➕ Add Task</button>
        <button class="action-btn secondary">🏆 View Achievements</button>

    </div>

</div>

</body>
</html>
