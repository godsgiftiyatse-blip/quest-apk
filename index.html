<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUEST</title>

<style>
body{
    margin:0;
    background:#0a0f1c;
    color:white;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.loader{
    width:60px;
    height:60px;
    border-radius:50%;
    border:4px solid rgba(255,255,255,0.1);
    border-top:4px solid #22c55e;
    animation:spin 1s linear infinite;
    margin:auto;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

.logo{
    font-size:40px;
    font-weight:bold;
    color:#22c55e;
    margin-top:20px;
}

.sub{
    opacity:.6;
    font-size:13px;
    margin-top:5px;
}
</style>

</head>

<body>

<div>
    <div class="loader"></div>
    <div class="logo">QUEST</div>
    <div class="sub">Checking world status...</div>
</div>

<!-- Firebase Router -->
<script type="module">
import { auth } from "./firebase.js";
import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* =========================
   SMART FIREBASE ROUTER
========================= */

onAuthStateChanged(auth, (user) => {

    setTimeout(() => {

        if (user) {
            window.location.href = "dashboard.html";
        } else {
            window.location.href = "login.html";
        }

    }, 1200); // small delay for loading effect
});
</script>

</body>
</html>
