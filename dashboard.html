<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest RPG Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f111a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .panel {
            margin-top: 20px;
            padding: 20px;
            background: #1c1f2b;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        #progressBar {
            height: 10px;
            width: 0%;
            background: #4f7cff;
            border-radius: 10px;
            transition: 0.3s;
        }

        .progress-container {
            background: #333;
            border-radius: 10px;
            height: 10px;
            margin-top: 10px;
        }

        .tasks {
            margin-top: 20px;
            width: 90%;
            max-width: 400px;
        }

        button {
            width: 100%;
            margin: 8px 0;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #4f7cff;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #3a5ed0;
        }

        .done {
            background: #2ecc71 !important;
        }

        #leaderboard {
            margin-top: 20px;
            width: 90%;
            max-width: 400px;
            background: #1c1f2b;
            padding: 15px;
            border-radius: 12px;
        }

        .lb-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid #333;
        }

        .lb-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>

    <!-- =========================
         PLAYER STATS PANEL
    ========================== -->
    <div class="panel">
        <h2 id="level">Level 1</h2>
        <p id="xpText">0 XP</p>

        <div class="progress-container">
            <div id="progressBar"></div>
        </div>
    </div>

    <!-- =========================
         QUEST SYSTEM
    ========================== -->
    <div class="tasks">
        <button id="task1">Complete Daily Task (+20 XP)</button>
        <button id="task2">Defeat Monster (+50 XP)</button>
        <button id="task3">Boss Challenge (+100 XP)</button>
    </div>

    <!-- =========================
         MULTIPLAYER LEADERBOARD
    ========================== -->
    <div id="leaderboard">
        <h3>🏆 Leaderboard</h3>
    </div>

    <!-- =========================
         SCRIPTS
    ========================== -->
    <script type="module" src="dashboard.js"></script>

</body>
</html>
