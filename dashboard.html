<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUEST Dashboard V3</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="page">

<!-- TOP BAR -->
<div class="topbar">

    <div class="user-info">
        <h3 id="greeting">Welcome 👋</h3>
        <p id="levelText">Level Explorer</p>
    </div>

    <div class="avatar">Q</div>

</div>

<!-- DASHBOARD -->
<div class="dashboard">

    <!-- XP CARD -->
    <div class="card xp-card">

        <div class="level-row">
            <h2 id="level">Level 1</h2>
            <span id="xpText">0 XP</span>
        </div>

        <div class="progress-bar">
            <div class="progress" id="progressBar"></div>
        </div>

    </div>

    <!-- CURRENT QUEST -->
    <div class="card">
        <h3>Current Quest</h3>
        <p class="quest-title">WAEC Excellence</p>
        <p class="progress-text">Complete tasks to earn XP</p>
    </div>

    <!-- TASKS -->
    <div class="card">

        <h3>Today's Tasks</h3>

        <div class="task" onclick="completeTask(this)">
            ○ <span>Study Mathematics (+20 XP)</span>
        </div>

        <div class="task" onclick="completeTask(this)">
            ○ <span>Solve Past Questions (+20 XP)</span>
        </div>

        <div class="task" onclick="completeTask(this)">
            ○ <span>Revise Notes (+20 XP)</span>
        </div>

    </div>

    <!-- ACTIONS -->
    <div class="actions">
        <button class="action-btn">+ Add Task</button>
        <button class="action-btn secondary" onclick="logout()">Logout</button>
    </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">

    <div class="nav-item active">🏠<br>Home</div>
    <div class="nav-item">📚<br>Quests</div>
    <div class="nav-item">➕<br>Add</div>
    <div class="nav-item">👤<br>Profile</div>

</div>

<!-- APP SCRIPT -->
<script src="app.js"></script>

<script>
/* =========================
   AUTH CHECK
========================= */
if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "login.html";
}

/* =========================
   LOGOUT
========================= */
function logout(){
    localStorage.removeItem("loggedIn");
    window.location.href = "login.html";
}

/* =========================
   INIT UI ON LOAD
========================= */
window.onload = function(){
    if(window.updateUI) updateUI();
};
</script>

</body>
</html>
