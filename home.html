<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QUEST Map</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:20px;
    }

    .quest-card{
      background:#0D1524;
      padding:15px;
      border-radius:16px;
      text-align:center;
    }

    .quest-title{
      font-weight:700;
      margin-bottom:10px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="auth-card" style="margin-top:60px">

    <h1 class="auth-title">Quest Map 🧭</h1>

    <p class="auth-subtitle" id="userInfo">Loading...</p>

    <p style="color:#29F19C;font-weight:700;" id="stats">
      XP: 0 | Level: 1
    </p>

    <div class="grid">

      <div class="quest-card">
        <div class="quest-title">📚 Study</div>
        <button class="btn-primary" onclick="doQuest('study')">+20 XP</button>
      </div>

      <div class="quest-card">
        <div class="quest-title">💪 Fitness</div>
        <button class="btn-primary" onclick="doQuest('fitness')">+25 XP</button>
      </div>

      <div class="quest-card">
        <div class="quest-title">🧠 Focus</div>
        <button class="btn-primary" onclick="doQuest('focus')">+30 XP</button>
      </div>

      <div class="quest-card">
        <div class="quest-title">🎯 Challenge</div>
        <button class="btn-primary" onclick="doQuest('challenge')">+50 XP</button>
      </div>

    </div>

    <button class="btn-primary" style="margin-top:20px;" onclick="logout()">
      Logout
    </button>

  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } 
  from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

  import { getFirestore, doc, getDoc, updateDoc } 
  from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let userRef;
  let userData;

  onAuthStateChanged(auth, async (user) => {

    if (!user) {
      window.location.href = "login.html";
      return;
    }

    userRef = doc(db, "users", user.uid);
    const snap = await getDoc(userRef);

    userData = snap.data();

    document.getElementById("userInfo").textContent =
      "Welcome " + userData.name;

    updateUI();
  });

  window.doQuest = async function (type) {

    let rewards = {
      study: 20,
      fitness: 25,
      focus: 30,
      challenge: 50
    };

    let xpGain = rewards[type];

    let newXP = userData.xp + xpGain;
    let newLevel = userData.level;

    let maxXP = newLevel * 100;

    if (newXP >= maxXP) {
      newLevel++;
      newXP = newXP - maxXP;
    }

    await updateDoc(userRef, {
      xp: newXP,
      level: newLevel
    });

    userData.xp = newXP;
    userData.level = newLevel;

    updateUI();
  };

  function updateUI() {
    document.getElementById("stats").textContent =
      "XP: " + userData.xp + " | Level: " + userData.level;
  }

  window.logout = async function () {
    await signOut(auth);
    window.location.href = "login.html";
  };
</script>

</body>
</html>
