<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - QUEST</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="auth-card" style="margin-top:60px">

    <h1 class="auth-title">Your Quest</h1>

    <p class="auth-subtitle" id="userInfo">Loading...</p>

    <p style="margin-top:20px;color:#29F19C;font-weight:700;" id="stats">
      XP: 0 | Level: 1
    </p>

    <div style="margin-top:25px;">
      <button class="btn-primary" onclick="earnXP(10)">
        Complete Task (+10 XP)
      </button>

      <button class="btn-secondary" onclick="earnXP(25)">
        Hard Quest (+25 XP)
      </button>
    </div>

    <button class="btn-primary" style="margin-top:15px;" onclick="logout()">
      Logout
    </button>

  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } 
  from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

  import { getFirestore, doc, getDoc, updateDoc, increment } 
  from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let userRef = null;
  let userData = null;

  // 🔐 AUTH + LOAD DATA
  onAuthStateChanged(auth, async (user) => {

    if (!user) {
      window.location.href = "login.html";
      return;
    }

    currentUser = user;
    userRef = doc(db, "users", user.uid);

    const snap = await getDoc(userRef);

    if (snap.exists()) {
      userData = snap.data();

      document.getElementById("userInfo").textContent =
        "Welcome " + userData.name;

      updateUI();
    }

  });

  // 🎮 XP ENGINE
  window.earnXP = async function (amount) {

    if (!currentUser) return;

    const snap = await getDoc(userRef);
    const data = snap.data();

    let newXP = data.xp + amount;
    let newLevel = data.level;

    // 🏆 LEVEL SYSTEM
    if (newXP >= newLevel * 100) {
      newLevel += 1;
      newXP = 0;
      alert("Level Up! 🎉 You are now Level " + newLevel);
    }

    await updateDoc(userRef, {
      xp: newXP,
      level: newLevel
    });

    userData.xp = newXP;
    userData.level = newLevel;

    updateUI();
  };

  function updateUI() {
    document.getElementById("stats").textContent =
      "XP: " + userData.xp + " | Level: " + userData.level;
  }

  // 🚪 LOGOUT
  window.logout = async function () {
    await signOut(auth);
    window.location.href = "login.html";
  };
</script>

</body>
</html>
