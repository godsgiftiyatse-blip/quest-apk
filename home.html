<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QUEST Dashboard</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .progress-bar{
      width:100%;
      height:12px;
      background:#1E293B;
      border-radius:20px;
      overflow:hidden;
      margin-top:10px;
    }

    .progress{
      height:100%;
      width:0%;
      background:#29F19C;
      transition:0.3s ease;
    }

    .level-badge{
      display:inline-block;
      padding:6px 12px;
      background:#29F19C;
      color:black;
      border-radius:20px;
      font-weight:700;
      margin-top:10px;
    }

    .stat-box{
      margin-top:15px;
      padding:15px;
      background:#0D1524;
      border-radius:16px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="auth-card" style="margin-top:60px">

    <h1 class="auth-title">Dashboard</h1>

    <p class="auth-subtitle" id="userInfo">Loading...</p>

    <div class="level-badge" id="levelBadge">Level 1</div>

    <div class="stat-box">

      <p style="font-weight:700;">XP Progress</p>

      <div class="progress-bar">
        <div class="progress" id="xpBar"></div>
      </div>

      <p style="margin-top:10px;" id="xpText">XP: 0 / 100</p>

    </div>

    <div style="margin-top:25px;">

      <button class="btn-primary" onclick="completeQuest(10)">
        Easy Quest (+10 XP)
      </button>

      <button class="btn-primary" style="margin-top:10px;" onclick="completeQuest(25)">
        Medium Quest (+25 XP)
      </button>

      <button class="btn-secondary" style="margin-top:10px;" onclick="completeQuest(50)">
        Hard Quest (+50 XP)
      </button>

    </div>

    <button class="btn-primary" style="margin-top:20px;" onclick="logout()">
      Logout
    </button>

  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } 
  from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

  import { getFirestore, doc, getDoc, updateDoc } 
  from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let userRef;
  let userData;

  onAuthStateChanged(auth, async (user) => {

    if (!user) {
      window.location.href = "login.html";
      return;
    }

    userRef = doc(db, "users", user.uid);
    const snap = await getDoc(userRef);

    userData = snap.data();

    document.getElementById("userInfo").textContent =
      "Welcome " + userData.name;

    updateUI();
  });

  window.completeQuest = async function (xpGain) {

    let newXP = userData.xp + xpGain;
    let newLevel = userData.level;

    let maxXP = newLevel * 100;

    if (newXP >= maxXP) {
      newLevel++;
      newXP = newXP - maxXP;
    }

    await updateDoc(userRef, {
      xp: newXP,
      level: newLevel
    });

    userData.xp = newXP;
    userData.level = newLevel;

    updateUI();
  };

  function updateUI() {

    let maxXP = userData.level * 100;
    let percent = (userData.xp / maxXP) * 100;

    document.getElementById("levelBadge").textContent =
      "Level " + userData.level;

    document.getElementById("xpText").textContent =
      "XP: " + userData.xp + " / " + maxXP;

    document.getElementById("xpBar").style.width =
      percent + "%";
  }

  window.logout = async function () {
    await signOut(auth);
    window.location.href = "login.html";
  };
</script>

</body>
</html>
