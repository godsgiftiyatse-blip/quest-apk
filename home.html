<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - QUEST</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="auth-card" style="margin-top:60px">

    <h1 class="auth-title">Daily Quests</h1>

    <p class="auth-subtitle" id="userInfo">Loading...</p>

    <p style="margin-top:15px;color:#29F19C;font-weight:700;" id="stats">
      XP: 0 | Level: 1
    </p>

    <div style="margin-top:25px;">

      <h3 style="margin-bottom:10px;">Today’s Missions</h3>

      <button class="btn-primary" onclick="completeQuest('login')">
        Daily Login (+5 XP)
      </button>

      <button class="btn-primary" style="margin-top:10px;" onclick="completeQuest('task')">
        Complete Task (+15 XP)
      </button>

      <button class="btn-secondary" style="margin-top:10px;" onclick="completeQuest('hard')">
        Hard Quest (+30 XP)
      </button>

    </div>

    <button class="btn-primary" style="margin-top:20px;" onclick="logout()">
      Logout
    </button>

  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } 
  from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

  import { 
    getFirestore, doc, getDoc, updateDoc, increment, setDoc 
  } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let userRef;
  let userData;
  let currentUser;

  // 🔐 AUTH + LOAD DATA
  onAuthStateChanged(auth, async (user) => {

    if (!user) {
      window.location.href = "login.html";
      return;
    }

    currentUser = user;
    userRef = doc(db, "users", user.uid);

    const snap = await getDoc(userRef);
    userData = snap.data();

    // 🧠 DAILY RESET CHECK
    const today = new Date().toDateString();

    if (userData.lastLogin !== today) {
      await updateDoc(userRef, {
        lastLogin: today,
        dailyTasks: {
          login: false,
          task: false,
          hard: false
        }
      });

      userData.dailyTasks = {
        login: false,
        task: false,
        hard: false
      };
    }

    document.getElementById("userInfo").textContent =
      "Welcome " + userData.name;

    updateUI();
  });

  // 🎮 COMPLETE QUEST SYSTEM
  window.completeQuest = async function (type) {

    if (userData.dailyTasks[type]) {
      alert("Already completed today!");
      return;
    }

    let reward = 0;

    if (type === "login") reward = 5;
    if (type === "task") reward = 15;
    if (type === "hard") reward = 30;

    let newXP = userData.xp + reward;
    let newLevel = userData.level;

    // 🏆 LEVEL UP LOGIC
    if (newXP >= newLevel * 100) {
      newLevel++;
      newXP = 0;
      alert("LEVEL UP! 🎉 Now Level " + newLevel);
    }

    userData.dailyTasks[type] = true;

    await updateDoc(userRef, {
      xp: newXP,
      level: newLevel,
      dailyTasks: userData.dailyTasks
    });

    userData.xp = newXP;
    userData.level = newLevel;

    updateUI();
  };

  function updateUI() {
    document.getElementById("stats").textContent =
      "XP: " + userData.xp + " | Level: " + userData.level;
  }

  // 🚪 LOGOUT
  window.logout = async function () {
    await signOut(auth);
    window.location.href = "login.html";
  };
</script>

</body>
        </html>
