<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - QUEST</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="auth-card" style="margin-top:60px">

    <h1 class="auth-title">Your Quest</h1>

    <p class="auth-subtitle" id="userInfo">Loading...</p>

    <p style="margin-top:20px;color:#29F19C;font-weight:700;" id="stats">
      XP: 0 | Level: 1
    </p>

    <button class="btn-primary" onclick="logout()">
      Logout
    </button>

  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } 
  from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

  import { getFirestore, doc, getDoc } 
  from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {

    if (!user) {
      window.location.href = "login.html";
      return;
    }

    const docRef = doc(db, "users", user.uid);
    const docSnap = await getDoc(docRef);

    if (docSnap.exists()) {
      const data = docSnap.data();

      document.getElementById("userInfo").textContent =
        "Welcome " + data.name;

      document.getElementById("stats").textContent =
        "XP: " + data.xp + " | Level: " + data.level;

    }

  });

  window.logout = async function () {
    await signOut(auth);
    window.location.href = "login.html";
  };
</script>

</body>
</html>
